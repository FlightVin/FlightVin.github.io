<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Redirecting to Publications...</title>
    
    <link rel="canonical" href="/#publications">
    
    <meta http-equiv="refresh" content="0; url=/#publications">
    
    <script>
      // Instantly replaces the current URL with the root's publications anchor
      window.location.replace("/#publications");
    </script>
  </head>
  <body>
    <p>If you are not redirected automatically, <a href="/#publications">click here</a>.</p>
  </body>
</html>
