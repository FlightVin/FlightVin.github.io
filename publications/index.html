<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Redirecting to Publications...</title>
    
    <link rel="canonical" href="https://flightvin.github.io/#publications">
    
    <meta http-equiv="refresh" content="0; url=https://flightvin.github.io/#publications">
    
    <script>
      // .replace() is better than .href because it doesn't clutter the user's back-button history
      window.location.replace("https://flightvin.github.io/#publications");
    </script>
  </head>
  <body>
    <p>If you are not redirected automatically, <a href="https://flightvin.github.io/#publications">click here</a>.</p>
  </body>
</html>
